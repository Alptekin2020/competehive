name: PR Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1"

      - name: Security audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Prisma generate
        run: npm run db:generate

      - name: Schema sync check
        run: npm run check:schema-sync

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1"
          DATABASE_URL: "postgresql://user:pass@localhost:5432/ci"
          REDIS_URL: "redis://localhost:6379"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2ktYnVpbGQuY2xlcmsuYWNjb3VudHMuZGV2JA=="
          CLERK_SECRET_KEY: "sk_test_ci_build_placeholder_00000000000000"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
